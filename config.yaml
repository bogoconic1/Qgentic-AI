llm:
  main_agent_model: "gemini-3.1-pro-preview"
runtime:
  llm_max_retries: 5
  llm_backoff_sequence: [1, 5, 10, 30, 60]
  compaction_threshold_tokens: 200000  # compact when last call's prompt_token_count exceeds this
  compaction_keep_last: 4               # turns kept verbatim after summary
  # Filesystem tool allowlist — paths MainAgent's read_file/list_dir/etc. may touch.
  # The site-packages directory of the active Python interpreter is auto-added at
  # runtime; do not list it here. Add any additional absolute paths below.
  explore_allowed_roots:
    - /workspace
paths:
  task_root: "task"
tracking:
  wandb:
    entity: bogoconic1 # replace with your W&B entity
    project: qgentic-ai # replace with your W&B project
